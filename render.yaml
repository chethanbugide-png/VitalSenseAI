services:
  - type: web
    name: vitalsense-ai
    env: python
    buildCommand: "python -m pip install --upgrade pip && pip install -r requirements.txt && python ml/train_model.py"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
